apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: cicd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Deploy custom resources (PVs, PVCs, PostgreSQL, Middleware)
    - repoURL: http://git-server.cicd.svc.cluster.local/conf.git
      targetRevision: master
      path: f3s/immich/helm-chart
    # Deploy Immich Helm chart with custom values
    - repoURL: https://immich-app.github.io/immich-charts/
      chart: immich
      targetRevision: 0.10.3
      helm:
        releaseName: immich
        values: |
          valkey:
            enabled: true
            persistence:
              data:
                enabled: true
                type: persistentVolumeClaim
                size: 1Gi
                storageClass: ""
                existingClaim: "immich-valkey-pvc"
          immich:
            persistence:
              library:
                existingClaim: "immich-library-pvc"
          server:
            enabled: true
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                memory: 4Gi

            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchExpressions:
                          - key: app.kubernetes.io/name
                            operator: In
                            values:
                              - machine-learning
                      topologyKey: "kubernetes.io/hostname"
            persistence:
              ext-albena-rw:
                enabled: true
                type: persistentVolumeClaim
                existingClaim: immich-ext-albena-pvc
                globalMounts:
                  - path: /external-albena-rw
              ext-paul-rw:
                enabled: true
                type: persistentVolumeClaim
                existingClaim: immich-ext-paul-pvc
                globalMounts:
                  - path: /external-paul-rw
              ext-videos-rw:
                enabled: true
                type: persistentVolumeClaim
                existingClaim: immich-ext-videos-rw-pvc
                globalMounts:
                  - path: /external-videos-rw
              ext-videos-ro:
                enabled: true
                type: persistentVolumeClaim
                existingClaim: immich-ext-videos-ro-pvc
                globalMounts:
                  - path: /external-videos-ro
                    readOnly: true
            ingress:
              main:
                enabled: true
                annotations:
                  spec.ingressClassName: traefik
                  traefik.ingress.kubernetes.io/router.entrypoints: web
                  traefik.ingress.kubernetes.io/router.middlewares: services-immich-body-size@kubernetescrd
                hosts:
                  - host: immich.f3s.buetow.org
                    paths:
                      - path: "/"
                        service:
                          identifier: main
                          port: 2283
          machine-learning:
            enabled: true
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                memory: 4Gi

            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchExpressions:
                          - key: app.kubernetes.io/name
                            operator: In
                            values:
                              - server
                      topologyKey: "kubernetes.io/hostname"
            persistence:
              cache:
                enabled: true
                type: persistentVolumeClaim
                size: 10Gi
                storageClass: ""
                existingClaim: "immich-ml-cache-pvc"
          controllers:
            main:
              containers:
                main:
                  env:
                    DB_HOSTNAME: immich-postgres
                    DB_DATABASE_NAME: immich
                    DB_USERNAME: immich
                    DB_PASSWORD:
                      valueFrom:
                        secretKeyRef:
                          name: immich-db-secret
                          key: password
  destination:
    server: https://kubernetes.default.svc
    namespace: services
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
