apiVersion: apps/v1
kind: Deployment
metadata:
  name: pkgrepo
  namespace: infra
  labels:
    app: pkgrepo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pkgrepo
  template:
    metadata:
      labels:
        app: pkgrepo
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 8080
        # Liveness probe: restart if nginx stops responding
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        # Readiness probe: remove from service if not ready
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: pkgrepo-storage
          mountPath: /usr/share/nginx/html
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
      volumes:
      - name: pkgrepo-storage
        persistentVolumeClaim:
          claimName: pkgrepo-pvc
      - name: nginx-config
        configMap:
          name: pkgrepo-nginx-config
